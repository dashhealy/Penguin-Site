<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flightless Friends</title>
    <link rel="stylesheet" href="style.css" defer />
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Flightless Friends Animation Tests</h1>
    <div class="smokestackCont">
      <img src="smokestack.png" alt="smokestack" id="imgSmokestack" />
      <img src="smog.png" alt="smog" id="imgSmog" />
      <p id="smokestackText">
        Small animations can be used across the site to create more visual
        intrigue
      </p>
    </div>
    <div class="penguinCont">
      <div class="penguinSad">
        <img src="head1.png" alt="head" id="imgHead" />
        <img src="body1.png" alt="body" id="imgBody" />
      </div>
      <div class="penguinHappy">
        <img src="wingL.png" alt="wingL" id="wingL" />
        <img src="body2.png" alt="imgBody2" id="imgBody2" />
        <img src="wingR.png" alt="wingR" id="wingR" />
      </div>
    </div>
  </body>
</html>
